<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Login</title>
</head>
<body>
  <h2>Login</h2>
  <form id="loginForm">
    <label>Username: <input id="username" /></label><br/>
    <label>Password: <input id="password" type="password" /></label><br/>
    <button type="submit">Login</button>
  </form>
  <div id="msg"></div>
  <script>
    const form = document.getElementById('loginForm');
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      console.log("Login js loaded");
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        credentials: "include", 
        body: JSON.stringify({username, password})
      });

      const data = await res.json();
      if (res.ok) {
        // store token
        localStorage.setItem('jwtToken', data.token);
        localStorage.setItem('username', data.username);
        //localStorage.setItem('refreshToken',data.refreshToken);
        document.getElementById('msg').innerText = 'Logged in. Go to Home.';
        window.location.href = '/home.html';
      } else {
        document.getElementById('msg').innerText = data.error || JSON.stringify(data);
      }
    });
  </script>
</body>
</html>
